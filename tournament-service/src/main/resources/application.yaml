server:
  port: 8082

spring:
  application:
    name: tournament-service

  datasource:
    url: jdbc:postgresql://localhost:5432/arenamanager?currentSchema=tournament_schema
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: tournament_schema
        hbm2ddl.create_namespaces: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true