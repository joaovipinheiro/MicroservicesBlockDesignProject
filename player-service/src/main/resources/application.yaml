server:
  port: 8081

spring:
  application:
    name: player-service

  datasource:
    url: jdbc:postgresql://localhost:5432/arenamanager?currentSchema=players
    username: root
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        default_schema: players
        hbm2ddl.create_namespaces: true # <-- ADICIONE ESTA LINHA AQUI

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/