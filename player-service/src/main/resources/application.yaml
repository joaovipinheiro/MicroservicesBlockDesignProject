server:
  port: 8081

spring:
  application:
    name: player-service

  datasource:
    url: jdbc:postgresql://localhost:5432/arenamanager?currentSchema=players
    username: root
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
#     ddl-auto: update # Alterado para update para não apagar os seus dados a cada reinício
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        default_schema: players
        hbm2ddl.create_namespaces: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
