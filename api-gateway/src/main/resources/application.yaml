server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true # Permite que o gateway encontre serviços no Eureka
      routes:
        - id: player-service-route
          uri: lb://PLAYER-SERVICE # lb = Load Balancer do Spring Cloud
          predicates:
            - Path=/api/players/** # Tudo que chegar no gateway com /api/players vai para o player-service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/